version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: project1-db
    environment:
      POSTGRES_USER: neondb_owner
      POSTGRES_PASSWORD: npg_hk9M4PXbDBar
      POSTGRES_DB: neondb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neondb_owner -d neondb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project1-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neondb
      SPRING_DATASOURCE_USERNAME: neondb_owner
      SPRING_DATASOURCE_PASSWORD: npg_hk9M4PXbDBar
      UPLOAD_DIR: /app/mp3Song
      UPLOAD_IMAGE: /app/user-images
    ports:
      - "8080:8080"
    volumes:
      - ./mp3Song:/app/mp3Song
      - ./user-images:/app/user-images
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
