<!doctype html>
<html lang="uk"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Вхід</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-md mx-auto mt-8 bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-6 text-gray-900 text-center">Увійти</h1>

        <!-- Error message -->
        <div th:if="${param.error}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
            <p>Username або пароль невірні</p>
        </div>

        <!-- Success message -->
        <div th:if="${param.success}" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
            <p>Реєстрація успішна! Тепер увійдіть.</p>
        </div>

        <form method="post" action="/login" class="space-y-4">
            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                <input type="text" id="username" name="username"
                       required autofocus class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                       placeholder="Введіть username">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Пароль</label>
                <input type="password" id="password" name="password"
                       required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                       placeholder="Введіть пароль">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                Увійти
            </button>
        </form>

        <!-- Link to register -->
        <p class="text-center mt-4 text-gray-700">
            Немаєте аккаунту? <a href="/register" class="text-green-500 hover:text-green-600 font-semibold">Зареєструйтеся</a>
        </p>
    </div>
</div>
</body>
</html>
