<!doctype html>
<html lang="uk"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Реєстрація</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-md mx-auto mt-8 bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-6 text-gray-900 text-center">Реєстрація</h1>

        <!-- Error message -->
        <div th:if="${error}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
            <p th:text="${error}"></p>
        </div>

        <!-- Success message -->
        <div th:if="${param.success}" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
            <p>Реєстрація успішна! Тепер увійдіть.</p>
        </div>

        <form method="post" action="/register" class="space-y-4">
            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                <input type="text" id="username" name="username" th:value="${registerDto.username}"
                       required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                       placeholder="Введіть username">
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <input type="email" id="email" name="email" th:value="${registerDto.email}"
                       required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                       placeholder="Введіть email">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Пароль (мін. 6 символів)</label>
                <input type="password" id="password" name="password"
                       required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                       placeholder="Введіть пароль">
            </div>

            <!-- Confirm Password -->
            <div>
                <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-2">Підтвердіть пароль</label>
                <input type="password" id="confirmPassword" name="confirmPassword"
                       required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                       placeholder="Повторіть пароль">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                Зареєструватися
            </button>
        </form>

        <!-- Link to login -->
        <p class="text-center mt-4 text-gray-700">
            Вже маєте аккаунт? <a href="/login" class="text-green-500 hover:text-green-600 font-semibold">Увійдіть</a>
        </p>
    </div>
</div>
</body>
</html>
